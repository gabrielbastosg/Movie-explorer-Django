{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador de Filmes</title>

    <link rel="stylesheet" href="{% static 'movies/style.css' %}">
</head>
<body>

    <nav class="navbar">
        <a href="{% url 'home' %}" class="logo">
            🎬 Movie Explorer
        </a>

        <a href="{% url 'favorites' %}" class="nav-link">
            ❤️ Favoritos
        </a>
    </nav>

    <main class="main-content">

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="alert-message">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}
        {% endblock %}

    </main>

    <footer class="footer">
        Desenvolvido por Gabriel Bastos
    </footer>

    <script src="{% static 'movies/script.js' %}"></script>

</body>
</html>
